version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: learning_platform_db
    environment:
      POSTGRES_USER: my_project_user
      POSTGRES_PASSWORD: my_secure_password
      POSTGRES_DB: learning_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: